name: Build Cross-Platform Binaries

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: libmidi-aarch64-apple-darwin.dylib
            lib: libmidi.dylib
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: libmidi-x86_64-unknown-linux-gnu.so
            lib: libmidi.so


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportmidi-dev libasound2-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install portmidi

      - name: Build binary
        env:
          LIBRARY_PATH: /opt/homebrew/lib
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig
          PKG_CONFIG_ALLOW_CROSS: 1
        run: |
          cd bindings/midi
          cargo build --release --target ${{ matrix.target }}

      - name: Copy and rename binary
        shell: bash
        run: |
          mkdir -p artifacts
          cp bindings/midi/target/${{ matrix.target }}/release/${{ matrix.lib }} artifacts/${{ matrix.name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-binary
          path: artifacts/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: binaries/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-jsr:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write # required for JSR OIDC auth

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish to JSR
        run: npx jsr publish
